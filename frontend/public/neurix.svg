<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1a0833"/>
      <stop offset="100%" stop-color="#0F051D"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="20" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow border -->
  <rect width="100" height="100" rx="20" fill="none" stroke="#8B5CF6" stroke-width="0.8" opacity="0.3"/>

  <!-- Neural N: left vertical -->
  <line x1="22" y1="22" x2="22" y2="78" stroke="url(#lineGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Neural N: diagonal top-left to bottom-right -->
  <line x1="22" y1="22" x2="78" y2="78" stroke="url(#lineGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Neural N: right vertical -->
  <line x1="78" y1="22" x2="78" y2="78" stroke="url(#lineGrad)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Corner nodes -->
  <circle cx="22" cy="22" r="5.5" fill="#8B5CF6" filter="url(#glow)"/>
  <circle cx="78" cy="22" r="5.5" fill="#7C3AED" filter="url(#glow)"/>
  <circle cx="22" cy="78" r="5.5" fill="#06B6D4" filter="url(#glow)"/>
  <circle cx="78" cy="78" r="5.5" fill="#06B6D4" filter="url(#glow)"/>

  <!-- Center intersection node -->
  <circle cx="50" cy="50" r="3.5" fill="#A78BFA" filter="url(#glow)" opacity="0.85"/>
</svg>
